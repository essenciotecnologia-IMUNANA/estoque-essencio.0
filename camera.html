<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESSENCIO | Pro Camera</title>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: Arial, sans-serif; overflow: hidden; }
        
        /* Container da Câmera */
        .camera-container { position: relative; width: 100vw; height: 100vh; }
        #video-preview { width: 100%; height: 100%; object-fit: cover; }
        
        /* Camada de Informações em Tempo Real (Overlay) */
        #overlay-ui {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(0,0,0,0.5); border-radius: 15px;
            padding: 15px; color: white; pointer-events: none;
            border-left: 5px solid #BA9D58; display: flex; align-items: center;
        }
        .mini-map { width: 80px; height: 80px; border-radius: 8px; margin-right: 15px; border: 1px solid #fff; }
        .info-text div { font-size: 12px; margin-bottom: 2px; }
        .info-text .city { font-weight: bold; font-size: 14px; color: #BA9D58; }

        /* Controles */
        .controls {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-evenly; align-items: center;
        }
        .btn-icon { width: 50px; height: 50px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; border: 1px solid white; }
        
        #shutter-btn {
            width: 70px; height: 70px; background: white; border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.3); cursor: pointer;
        }
        .recording { background: red !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        #flash-status { position: absolute; top: 20px; right: 20px; color: yellow; font-size: 24px; }
    </style>
</head>
<body>

<div class="camera-container">
    <video id="video-preview" autoplay playsinline></video>
    <div id="flash-status">⚡ Off</div>

    <div id="overlay-ui">
        <img id="ui-map" class="mini-map" src="" alt="Mapa">
        <div class="info-text">
            <div id="ui-city" class="city">LOCALIZANDO...</div>
            <div id="ui-addr">Buscando endereço...</div>
            <div id="ui-coords">LAT: 0.000000 | LON: 0.000000</div>
            <div id="ui-date">--/--/---- --:--:--</div>
        </div>
    </div>

    <div class="controls">
        <div class="btn-icon" onclick="toggleFlash()">FLASH</div>
        <div id="shutter-btn" onclick="handleCapture()"></div>
        <div class="btn-icon" id="mode-btn" onclick="toggleMode()">FOTO</div>
    </div>
</div>

<canvas id="hidden-canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video-preview');
    const shutter = document.getElementById('shutter-btn');
    const modeBtn = document.getElementById('mode-btn');
    let isVideoMode = false;
    let isRecording = false;
    let mediaRecorder;
    let recordedChunks = [];
    let flashOn = false;

    let geoData = { lat: 0, lon: 0, city: "", addr: "", map: "" };

    // Iniciar Câmera
    async function startCam() {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: { ideal: 1280 } },
            audio: true 
        });
        video.srcObject = stream;
    }

    // Toggle Flash (Se suportado pelo navegador/hardware)
    async function toggleFlash() {
        const track = video.srcObject.getVideoTracks()[0];
        flashOn = !flashOn;
        try {
            await track.applyConstraints({ advanced: [{ torch: flashOn }] });
            document.getElementById('flash-status').innerText = flashOn ? "⚡ On" : "⚡ Off";
        } catch(e) { alert("Flash não suportado neste navegador."); }
    }

    function toggleMode() {
        isVideoMode = !isVideoMode;
        modeBtn.innerText = isVideoMode ? "VÍDEO" : "FOTO";
        shutter.style.borderRadius = isVideoMode ? "10px" : "50%";
    }

    // Atualizar UI em Tempo Real
    navigator.geolocation.watchPosition(p => {
        geoData.lat = p.coords.latitude.toFixed(6);
        geoData.lon = p.coords.longitude.toFixed(6);
        
        const z=15; 
        const x=Math.floor((p.coords.longitude+180)/360*Math.pow(2,z));
        const y=Math.floor((1-Math.log(Math.tan(p.coords.latitude*Math.PI/180)+1/Math.cos(p.coords.latitude*Math.PI/180))/Math.PI)/2*Math.pow(2,z));
        
        geoData.map = `https://tile.openstreetmap.org/${z}/${x}/${y}.png`;
        document.getElementById('ui-map').src = geoData.map;
        document.getElementById('ui-coords').innerText = `LAT: ${geoData.lat} | LON: ${geoData.lon}`;

        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${geoData.lat}&lon=${geoData.lon}&format=json`)
            .then(r => r.json()).then(d => {
                geoData.city = (d.address.city || d.address.town || "Rio").toUpperCase();
                geoData.addr = d.address.road || "Logradouro não identificado";
                document.getElementById('ui-city').innerText = geoData.city;
                document.getElementById('ui-addr').innerText = geoData.addr;
            });
    }, null, { enableHighAccuracy: true });

    setInterval(() => {
        document.getElementById('ui-date').innerText = new Date().toLocaleString() + " GMT -03:00";
    }, 1000);

    // Captura de Foto ou Vídeo
    function handleCapture() {
        if (!isVideoMode) {
            takePhoto();
        } else {
            if (!isRecording) startRecording();
            else stopRecording();
        }
    }

    function takePhoto() {
        const canvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        // Desenha o vídeo
        ctx.drawImage(video, 0, 0);
        
        // Desenha o selo (Overlay) na foto final igual ao que está na tela
        const s = canvas.width / 1000;
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(50*s, canvas.height - 250*s, canvas.width - 100*s, 200*s);
        
        ctx.fillStyle = "#BA9D58";
        ctx.font = `bold ${35*s}px Arial`;
        ctx.fillText(geoData.city, 80*s, canvas.height - 180*s);
        
        ctx.fillStyle = "white";
        ctx.font = `${25*s}px Arial`;
        ctx.fillText(geoData.addr, 80*s, canvas.height - 140*s);
        ctx.fillText(`LAT: ${geoData.lat} LON: ${geoData.lon}`, 80*s, canvas.height - 100*s);
        ctx.fillText(document.getElementById('ui-date').innerText, 80*s, canvas.height - 60*s);

        const link = document.createElement('a');
        link.download = 'ESSENCIO_FOTO.jpg';
        link.href = canvas.toDataURL('image/jpeg');
        link.click();
    }

    function startRecording() {
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(video.srcObject);
        mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: "video/mp4" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "ESSENCIO_VIDEO.mp4"; a.click();
        };
        mediaRecorder.start();
        isRecording = true;
        shutter.classList.add('recording');
    }

    function stopRecording() {
        mediaRecorder.stop();
        isRecording = false;
        shutter.classList.remove('recording');
    }

    startCam();
</script>
</body>
</html>
